# Group convolution experiment: replace 1x1 expand/project with grouped conv.
# FLOPs in targeted layers divided by `groups`.  Speedup on any GPU.
#
# Usage:
#   python scripts/run_group_conv.py
#   python scripts/run_group_conv.py groups=4 target=both results_name=group4_both
#   python scripts/run_group_conv.py groups=2 target=expand results_name=group2_expand

defaults:
  - /dataloader: sr
  - /datasets: sr_x4
  - /transforms: sr
  - _self_

checkpoint_in: checkpoints/heavy_srunet_29M.pt
checkpoint_out: checkpoints/heavy_srunet_group2.pt
results_dir: results
results_name: group_conv_2_expand

model:
  _target_: src.model.heavy_model.SRUNetHeavy
  in_channels: 3
  out_channels: 3
  base_channels: 96
  expand_ratio: 4
  se_bottleneck_ratio: 4
  residual: true
  num_groups: 8

groups: 2          # 2 or 4
target: expand     # expand | project | both

finetune:
  enabled: true
  epochs: 5
  lr: 1e-4
  criterion:
    _target_: src.loss.l1.L1LossWrapper
  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-4
    weight_decay: 1e-5

benchmark:
  input_size: [1, 3, 256, 256]
  n_warmup: 20
  n_runs: 200
