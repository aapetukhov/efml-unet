# Pair and tensor transforms for SR
normalize: false         # keep tensors in [0, 1] to avoid color shifts at eval/inference
mean: [0.5, 0.5, 0.5]
std: [0.5, 0.5, 0.5]
resize_before_crop: null  # optional (h, w)

# Light spatial augmentations (train only)
hflip_prob: 0.5
vflip_prob: 0.25
rotate90_prob: 0.5
transpose_prob: 0.3

# Color / noise augs disabled to prevent unwanted hue shifts
color_jitter_prob: 0.0
color_jitter:
  brightness: 0.0
  contrast: 0.0
  saturation: 0.0
  hue: 0.0
gaussian_noise_prob: 0.0
gaussian_noise_std: 0.0

# Cutout (train only), keeps fill neutral gray to avoid color bias
cutout_prob: 0.4
cutout_min_ratio: 0.02
cutout_max_ratio: 0.08
