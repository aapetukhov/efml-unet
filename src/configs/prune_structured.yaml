# Structured expand-channel pruning: physically removes mid_ch channels
# from every MBResBlock. Gives real FLOPs/latency reduction on any hardware.
#
# Usage:
#   python scripts/run_prune_structured.py
#   python scripts/run_prune_structured.py prune_ratio=0.25 results_name=struct_25
#   python scripts/run_prune_structured.py prune_ratio=0.5 finetune.epochs=10

defaults:
  - /dataloader: sr
  - /datasets: sr_x4
  - /transforms: sr
  - _self_

checkpoint_in: checkpoints/heavy_srunet_29M.pt
checkpoint_out: checkpoints/heavy_srunet_struct_pruned.pt
results_dir: results
results_name: struct_prune_25

model:
  _target_: src.model.heavy_model.SRUNetHeavy
  in_channels: 3
  out_channels: 3
  base_channels: 96
  expand_ratio: 4
  se_bottleneck_ratio: 4
  residual: true
  num_groups: 8

prune_ratio: 0.25

finetune:
  enabled: true
  epochs: 5
  lr: 1e-4
  criterion:
    _target_: src.loss.l1.L1LossWrapper
  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-4
    weight_decay: 1e-5

benchmark:
  input_size: [1, 3, 256, 256]
  n_warmup: 20
  n_runs: 200
